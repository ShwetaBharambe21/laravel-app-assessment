services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: laravel-app

    working_dir: /var/www/html

    volumes:
      - .:/var/www/html

  nginx:
    image: nginx:latest

    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: laravel-queue

    working_dir: /var/www/html

    command: php artisan queue:work

    volumes:
      - .:/var/www/html

    depends_on:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: laravel-scheduler

    working_dir: /var/www/html

    command: >
      sh -c "while true;
      do php artisan schedule:run;
      sleep 60;
      done"

    volumes:
      - .:/var/www/html

    depends_on:
      - app